<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airdrop List Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .main-card { background: #0f172a; border-radius: 24px; border: 1px solid #1e293b; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; }
        .tab-btn { padding: 14px 20px; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 3px solid transparent; transition: all 0.3s; color: #64748b; white-space: nowrap; }
        .tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .scroll-area { height: 65vh; overflow-y: auto; padding: 1.5rem; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }
        .airdrop-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 1rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; align-items: center; aspect-ratio: 1/1; justify-content: space-between; position: relative; }
        .airdrop-card:hover { border-color: #3b82f6; transform: translateY(-4px); background: #232f46; }
        
        /* Gaya untuk label VISITED */
        .is-opened { border-color: #1d4ed8 !important; background: #0f172a !important; }
        .is-opened::after { 
            content: "VISITED"; 
            position: absolute; 
            top: 8px; 
            left: 8px; 
            font-size: 7px; 
            font-weight: 800; 
            color: #3b82f6; 
            background: rgba(59, 130, 246, 0.1); 
            padding: 2px 6px; 
            border-radius: 4px; 
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .modal-bg { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(12px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-extrabold tracking-tighter text-white">AIRDROP<span class="text-blue-500">LIST</span></h1>
                <p id="current-date" class="text-[10px] font-bold text-slate-500 tracking-[0.3em] uppercase mt-1">Connecting...</p>
            </div>
            <button onclick="toggleModal()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-900/20 transition-all">
                + NEW PROJECT
            </button>
        </div>

        <div class="main-card">
            <div class="p-4 bg-slate-900/50 border-b border-slate-800">
                <div class="relative max-w-md">
                    <span class="absolute left-4 top-3.5 text-slate-500">🔍</span>
                    <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search Airdrop..." class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-3 pl-12 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                </div>
            </div>

            <div class="flex border-b border-slate-800 overflow-x-auto no-scrollbar bg-slate-900/30 px-2">
                <button class="tab-btn active" id="tab-Daily" onclick="switchTab('Daily')">Daily</button>
                <button class="tab-btn" id="tab-Weekly" onclick="switchTab('Weekly')">Weekly</button>
                <button class="tab-btn" id="tab-Waitlist" onclick="switchTab('Waitlist')">Waitlist</button>
                <button class="tab-btn" id="tab-Testnet" onclick="switchTab('Testnet')">Testnet</button>
                <button class="tab-btn" id="tab-Task" onclick="switchTab('Task')">Task</button>
                <button class="tab-btn" id="tab-Telegram" onclick="switchTab('Telegram')">Telegram</button>
            </div>

            <div class="scroll-area">
                <div id="grid-content" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-bg fixed inset-0 flex items-center justify-center z-50 hidden p-6">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[32px] w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-white text-center">New Project</h2>
            <div class="space-y-4">
                <input type="text" id="nameInput" placeholder="Name" class="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl text-white outline-none focus:border-blue-500">
                <input type="text" id="linkInput" placeholder="Link (URL)" class="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl text-white outline-none focus:border-blue-500">
                <select id="groupInput" onchange="updateModalFields()" class="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl text-white font-bold outline-none focus:border-blue-500">
                    <option value="Daily">Daily Tasks</option>
                    <option value="Weekly">Weekly Check-in</option>
                    <option value="Waitlist">Waitlist</option>
                    <option value="Testnet">Testnet</option>
                    <option value="Task">Task</option>
                    <option value="Telegram">Telegram</option>
                </select>
                <div class="flex gap-3 pt-4">
                    <button onclick="toggleModal()" class="flex-1 text-slate-400 py-4 font-bold hover:text-white">Cancel</button>
                    <button id="saveBtn" onclick="addItem()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-900/20">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal-bg fixed inset-0 flex items-center justify-center z-[60] hidden p-6">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[32px] w-full max-w-xs shadow-2xl text-center">
            <div class="text-red-500 text-5xl mb-4">×</div>
            <h2 class="text-xl font-bold mb-2 text-white">Delete?</h2>
            <p class="text-slate-500 text-sm mb-8">This action cannot be undone.</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 bg-slate-800 text-white py-3 rounded-xl font-bold">No</button>
                <button id="confirmDeleteBtn" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">Yes</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwF1gS6FZ1OZNC0GKygPWtkKix47Cmu6eJPuvsYFfdQ8q-ubCXejHqdkkAl8Kw8Jv4mIw/exec"; 
        let airdropData = [];
        let currentTab = 'Daily';
        let deleteIdTarget = null;
        const today = new Date().toDateString();

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                airdropData = await response.json();
                document.getElementById('current-date').innerText = today.toUpperCase();
                renderContent();
            } catch (err) {
                document.getElementById('current-date').innerText = "CONNECTION LOST";
            }
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            renderContent();
        }

        function handleSearch() { 
            renderContent(document.getElementById('searchInput').value.toLowerCase()); 
        }

        function markAsOpened(id) {
            const visitedKey = `opened_${id}_${today}`;
            localStorage.setItem(visitedKey, 'true');
            renderContent(document.getElementById('searchInput').value.toLowerCase());
        }

        function updateModalFields() {
            const group = document.getElementById('groupInput').value;
            const linkInput = document.getElementById('linkInput');
            linkInput.placeholder = (group === 'Telegram') ? "Tanggal / Keterangan" : "Link (URL)";
        }

        function updateTabCounts() {
            const groups = ['Daily', 'Weekly', 'Waitlist', 'Testnet', 'Task', 'Telegram'];
            groups.forEach(g => {
                const count = airdropData.filter(item => item.group === g).length;
                const tabBtn = document.getElementById(`tab-${g}`);
                if (tabBtn) {
                    tabBtn.innerHTML = `${g} <span class="ml-1.5 px-1.5 py-0.5 bg-slate-800 text-slate-400 rounded-md text-[9px] border border-slate-700">${count}</span>`;
                    if (currentTab === g) {
                        const badge = tabBtn.querySelector('span');
                        badge.className = "ml-1.5 px-1.5 py-0.5 bg-blue-600/20 text-blue-400 rounded-md text-[9px] border border-blue-500/30";
                    }
                }
            });
        }

        function renderContent(searchQuery = "") {
            const container = document.getElementById('grid-content');
            if (!container) return;
            container.innerHTML = '';
            updateTabCounts();

            const filtered = airdropData.filter(item => item.group === currentTab && item.name.toLowerCase().includes(searchQuery));

            filtered.forEach(item => {
                // Pengecekan Visited berbasis tanggal (reset setiap 24 jam)
                const isOpened = localStorage.getItem(`opened_${item.id}_${today}`);
                
                const div = document.createElement('div');
                div.className = `airdrop-card ${isOpened ? 'is-opened' : ''}`;
                
                let actionHTML = '';
                if (item.group === 'Telegram') {
                    // Untuk Telegram, klik pada card menandai Visited
                    actionHTML = `<div class="w-full bg-slate-800/50 py-2 rounded-xl border border-slate-700 text-center" onclick="markAsOpened(${item.id})">
                                    <span class="text-[9px] font-bold text-slate-400 block uppercase">Tanggal</span>
                                    <span class="text-[10px] font-black text-blue-400">${item.link || '-'}</span>
                                  </div>`;
                } else {
                    // Untuk Link, tombol Open menandai Visited
                    actionHTML = `<a href="${item.link}" target="_blank" onclick="markAsOpened(${item.id})" class="block w-full bg-blue-600 hover:bg-blue-500 text-white text-[10px] py-2 rounded-xl font-black text-center shadow-lg shadow-blue-900/20 transition-all">OPEN</a>`;
                }

                div.innerHTML = `
                    <button onclick="openDeleteModal(${item.id})" class="absolute top-3 right-3 text-slate-600 hover:text-red-500 transition-colors z-10">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <div class="mt-4 flex flex-col items-center w-full h-full justify-center">
                        <div class="text-4xl mb-2">${getIcon(item.group)}</div>
                        <span class="font-extrabold text-[10px] text-center uppercase tracking-tight text-slate-200 line-clamp-2 px-1">${item.name}</span>
                    </div>
                    <div class="w-full mt-2">${actionHTML}</div>`;
                container.appendChild(div);
            });
        }

        function getIcon(group) {
            const icons = { 'Daily': '💎', 'Weekly': '🗓️', 'Waitlist': '⏳', 'Testnet': '🛠️', 'Task': '📜', 'Telegram': '🚀' };
            return icons[group] || '🔗';
        }

        async function addItem() {
            const name = document.getElementById('nameInput').value;
            let link = document.getElementById('linkInput').value;
            const group = document.getElementById('groupInput').value;
            const btn = document.getElementById('saveBtn');

            if (!name || !link) return alert("Isi semua data!");
            if (group !== 'Telegram' && !link.startsWith('http')) link = 'https://' + link;

            btn.innerText = "..."; btn.disabled = true;
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add', id: Date.now(), name, link, group }) });
                toggleModal();
                btn.innerText = "Save"; btn.disabled = false;
                document.getElementById('nameInput').value = ''; 
                document.getElementById('linkInput').value = '';
                fetchData();
            } catch (err) { btn.innerText = "Save"; btn.disabled = false; }
        }

        function openDeleteModal(id) {
            deleteIdTarget = id;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        document.getElementById('confirmDeleteBtn').onclick = async () => {
            const btn = document.getElementById('confirmDeleteBtn');
            btn.innerText = "...";
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: deleteIdTarget }) });
            closeDeleteModal();
            btn.innerText = "Yes";
            fetchData();
        };

        function closeDeleteModal() { document.getElementById('deleteModal').classList.add('hidden'); }
        function toggleModal() { 
            document.getElementById('modal').classList.toggle('hidden'); 
            updateModalFields(); 
        }

        fetchData();
    </script>
</body>
</html>
